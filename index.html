<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouGlish Clone — Pronunciation Search</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #252525;
    --border: #333;
    --accent: #ff6b35;
    --accent2: #4ecdc4;
    --text: #ffffff;
    --muted: #888;
    --error: #ff4757;
    --success: #2ed573;
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    line-height: 1.6;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 0 30px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 30px;
  }

  .logo {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .tagline {
    color: var(--muted);
    font-size: 16px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* Search Section */
  .search-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 24px;
    display: flex;
    gap: 16px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .input-group {
    flex: 1;
    min-width: 250px;
  }

  .input-label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  .search-input {
    width: 100%;
    height: 52px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 0 16px;
    color: var(--text);
    font-size: 18px;
    font-family: inherit;
    transition: all 0.2s;
  }

  .search-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .accent-selector {
    display: flex;
    gap: 8px;
  }

  .accent-btn {
    height: 52px;
    padding: 0 28px;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .accent-btn:hover {
    border-color: var(--muted);
  }

  .accent-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .search-btn {
    height: 52px;
    padding: 0 32px;
    background: var(--success);
    border: none;
    border-radius: var(--radius);
    color: #000;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .search-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(46, 213, 115, 0.3);
  }

  .search-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Player Section */
  .player-section {
    display: none;
    grid-template-columns: 1fr 350px;
    gap: 24px;
    margin-bottom: 24px;
  }

  .player-section.active {
    display: grid;
  }

  @media (max-width: 900px) {
    .player-section {
      grid-template-columns: 1fr;
    }
  }

  .main-player {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .video-container {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
  }

  #youtubePlayer {
    width: 100%;
    height: 100%;
  }

  .player-controls {
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .control-btn {
    width: 40px;
    height: 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .control-btn:hover {
    background: var(--border);
    border-color: var(--muted);
  }

  .control-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    width: 48px;
    height: 48px;
  }

  .control-info {
    flex: 1;
    min-width: 0;
  }

  .control-title {
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 14px;
  }

  .control-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .timestamp {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--accent);
    font-weight: 600;
    background: rgba(255, 107, 53, 0.1);
    padding: 4px 12px;
    border-radius: 4px;
  }

  /* Subtitle Display */
  .subtitle-box {
    padding: 24px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    min-height: 100px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .subtitle-text {
    font-size: 22px;
    line-height: 1.6;
    text-align: center;
    color: var(--text);
    font-weight: 500;
  }

  .subtitle-text .highlight {
    color: var(--accent);
    font-weight: 700;
    border-bottom: 3px solid var(--accent);
    padding: 0 4px;
  }

  .subtitle-text .context {
    color: var(--muted);
    font-weight: 400;
  }

  /* Sidebar */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .stats-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .stats-title {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    font-weight: 600;
  }

  .occurrence-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 400px;
    overflow-y: auto;
  }

  .occurrence-item {
    padding: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
  }

  .occurrence-item:hover {
    border-color: var(--accent);
    background: rgba(255, 107, 53, 0.1);
  }

  .occurrence-item.active {
    border-color: var(--accent);
    background: rgba(255, 107, 53, 0.15);
  }

  .occurrence-text {
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .occurrence-meta {
    color: var(--muted);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
  }

  .occurrence-text .match {
    color: var(--accent);
    font-weight: 700;
  }

  /* Navigation */
  .nav-buttons {
    display: flex;
    gap: 8px;
  }

  .nav-btn {
    flex: 1;
    height: 44px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .nav-btn:hover:not(:disabled) {
    background: var(--border);
    border-color: var(--muted);
  }

  .nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* Progress */
  .progress-container {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }

  .progress-container.active {
    display: block;
  }

  .progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 12px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.3s;
  }

  .progress-text {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }

  /* Status Messages */
  .message {
    display: none;
    padding: 16px 20px;
    border-radius: var(--radius);
    margin-bottom: 24px;
    align-items: center;
    gap: 12px;
  }

  .message.active {
    display: flex;
  }

  .message.error {
    background: rgba(255, 71, 87, 0.1);
    border: 1px solid rgba(255, 71, 87, 0.3);
    color: var(--error);
  }

  .message.info {
    background: rgba(78, 205, 196, 0.1);
    border: 1px solid rgba(78, 205, 196, 0.3);
    color: var(--accent2);
  }

  /* Loading Spinner */
  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Responsive */
  @media (max-width: 640px) {
    .search-container {
      flex-direction: column;
    }
    .input-group {
      width: 100%;
    }
    .accent-selector {
      width: 100%;
    }
    .accent-btn {
      flex: 1;
      justify-content: center;
    }
    .search-btn {
      width: 100%;
      justify-content: center;
    }
    .subtitle-text {
      font-size: 18px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <div class="logo">YouGlish Clone</div>
    <p class="tagline">Search YouTube videos to hear native speakers pronounce any word or phrase in real context.</p>
  </header>

  <div class="search-container">
    <div class="input-group">
      <label class="input-label">Word or Phrase</label>
      <input type="text" class="search-input" id="searchInput" placeholder="e.g., 'entrepreneur', 'schedule', 'pronunciation'" autocomplete="off">
    </div>
    
    <div class="input-group" style="flex: 0;">
      <label class="input-label">Accent</label>
      <div class="accent-selector">
        <button class="accent-btn active" data-accent="us" onclick="setAccent('us')">🇺🇸 US</button>
        <button class="accent-btn" data-accent="uk" onclick="setAccent('uk')">🇬🇧 UK</button>
        <button class="accent-btn" data-accent="au" onclick="setAccent('au')">🇦🇺 AU</button>
      </div>
    </div>

    <button class="search-btn" id="searchBtn" onclick="startSearch()">
      <span>🔍</span>
      Search
    </button>
  </div>

  <div class="progress-container" id="progressContainer">
    <div class="progress-text">
      <span id="progressStatus">Initializing search...</span>
      <span id="progressCount">0/0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="message error" id="errorMsg">
    <span>⚠️</span>
    <span id="errorText"></span>
  </div>

  <div class="message info" id="infoMsg">
    <span>ℹ️</span>
    <span id="infoText"></span>
  </div>

  <div class="player-section" id="playerSection">
    <div class="main-player">
      <div class="video-container">
        <div id="youtubePlayer"></div>
      </div>
      
      <div class="player-controls">
        <button class="control-btn" onclick="prevOccurrence()" title="Previous">◀</button>
        <button class="control-btn primary" id="playPauseBtn" onclick="togglePlay()">▶</button>
        <button class="control-btn" onclick="nextOccurrence()" title="Next">▶</button>
        
        <div class="control-info">
          <div class="control-title" id="videoTitle">Loading...</div>
          <div class="control-meta" id="videoMeta">Searching transcripts...</div>
        </div>
        
        <div class="timestamp" id="currentTime">0:00</div>
      </div>

      <div class="subtitle-box">
        <div class="subtitle-text" id="subtitleDisplay">
          <span style="color: var(--muted); font-style: italic;">Subtitles will appear here...</span>
        </div>
      </div>
    </div>

    <div class="sidebar">
      <div class="stats-card">
        <div class="stats-title">Found Occurrences</div>
        <div class="occurrence-list" id="occurrenceList">
          <!-- Populated dynamically -->
        </div>
      </div>

      <div class="nav-buttons">
        <button class="nav-btn" onclick="prevOccurrence()" id="prevBtn">← Previous</button>
        <button class="nav-btn" onclick="nextOccurrence()" id="nextBtn">Next →</button>
      </div>
    </div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const API_BASE = 'http://localhost:8000';

let state = {
  accent: 'us',
  query: '',
  occurrences: [],
  currentIndex: 0,
  player: null,
  isPlaying: false,
  isSearching: false
};

function onYouTubeIframeAPIReady() {
  state.player = new YT.Player('youtubePlayer', {
    height: '100%',
    width: '100%',
    playerVars: {
      autoplay: 0,
      controls: 0,
      disablekb: 1,
      fs: 0,
      rel: 0,
      modestbranding: 1
    },
    events: {
      onReady: () => {
        console.log('Player ready');
      },
      onStateChange: (e) => {
        state.isPlaying = e.data === YT.PlayerState.PLAYING;
        document.getElementById('playPauseBtn').textContent = state.isPlaying ? '⏸' : '▶';
      }
    }
  });
}

function setAccent(accent) {
  state.accent = accent;
  document.querySelectorAll('.accent-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.accent === accent);
  });
}

async function startSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query || state.isSearching) return;
  
  state.query = query.toLowerCase();
  state.isSearching = true;
  state.occurrences = [];
  state.currentIndex = 0;
  
  document.getElementById('playerSection').classList.remove('active');
  document.getElementById('errorMsg').classList.remove('active');
  document.getElementById('infoMsg').classList.remove('active');
  document.getElementById('progressContainer').classList.add('active');
  document.getElementById('searchBtn').disabled = true;
  document.getElementById('occurrenceList').innerHTML = '';
  
  updateProgress(0, 1, 'Searching transcripts...');
  
  try {
    const response = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}&accent=${state.accent}`);
    const data = await response.json();
    
    if (data.error) {
      throw new Error(data.error);
    }
    
    state.occurrences = data.results || [];
    
    if (state.occurrences.length === 0) {
      throw new Error('No match found in any transcripts. Try a different word or phrase.');
    }
    
    document.getElementById('progressContainer').classList.remove('active');
    document.getElementById('playerSection').classList.add('active');
    document.getElementById('searchBtn').disabled = false;
    state.isSearching = false;
    
    renderOccurrenceList();
    loadOccurrence(0);
    
  } catch (error) {
    showError(error.message);
    document.getElementById('progressContainer').classList.remove('active');
    document.getElementById('searchBtn').disabled = false;
    state.isSearching = false;
  }
}

function loadOccurrence(index) {
  if (index < 0 || index >= state.occurrences.length) return;
  
  state.currentIndex = index;
  const occ = state.occurrences[index];
  
  if (state.player && state.player.loadVideoById) {
    const startTime = Math.max(0, occ.timestamp - 1);
    state.player.loadVideoById({
      videoId: occ.videoId,
      startSeconds: startTime
    });
  }
  
  document.getElementById('videoTitle').textContent = occ.video_title || 'Loading...';
  document.getElementById('videoMeta').textContent = `${occ.video_channel || 'Unknown'} • Match ${index + 1} of ${state.occurrences.length}`;
  document.getElementById('currentTime').textContent = formatTime(occ.timestamp);
  
  const regex = new RegExp(`(${escapeRegex(state.query)})`, 'gi');
  const highlighted = escapeHtml(occ.sentence).replace(regex, '<span class="highlight">$1</span>');
  document.getElementById('subtitleDisplay').innerHTML = highlighted;
  
  document.querySelectorAll('.occurrence-item').forEach((el, i) => {
    el.classList.toggle('active', i === index);
    if (i === index) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
  
  document.getElementById('prevBtn').disabled = index === 0;
  document.getElementById('nextBtn').disabled = index === state.occurrences.length - 1;
}

function renderOccurrenceList() {
  const container = document.getElementById('occurrenceList');
  container.innerHTML = '';
  
  state.occurrences.forEach((occ, index) => {
    const item = document.createElement('div');
    item.className = 'occurrence-item';
    if (index === 0) item.classList.add('active');
    
    const regex = new RegExp(`(${escapeRegex(state.query)})`, 'gi');
    const highlightedText = escapeHtml(occ.sentence).replace(regex, '<span class="match">$1</span>');
    
    item.innerHTML = `
      <div class="occurrence-text">${highlightedText}</div>
      <div class="occurrence-meta">${formatTime(occ.timestamp)} • ${occ.video_channel || 'Unknown'}</div>
    `;
    
    item.onclick = () => loadOccurrence(index);
    container.appendChild(item);
  });
}

function nextOccurrence() {
  if (state.currentIndex < state.occurrences.length - 1) {
    loadOccurrence(state.currentIndex + 1);
  }
}

function prevOccurrence() {
  if (state.currentIndex > 0) {
    loadOccurrence(state.currentIndex - 1);
  }
}

function togglePlay() {
  if (!state.player) return;
  
  if (state.isPlaying) {
    state.player.pauseVideo();
  } else {
    state.player.playVideo();
  }
}

function updateProgress(current, total, text) {
  document.getElementById('progressStatus').textContent = text;
  document.getElementById('progressCount').textContent = `${current}/${total}`;
  document.getElementById('progressFill').style.width = `${total > 0 ? (current / total) * 100 : 0}%`;
}

function showError(text) {
  document.getElementById('errorText').textContent = text;
  document.getElementById('errorMsg').classList.add('active');
}

function formatTime(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function escapeRegex(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

document.getElementById('searchInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') startSearch();
});

document.getElementById('searchInput').addEventListener('input', async (e) => {
  const text = e.target.value.trim();
  if (text.length >= 2) {
    try {
      const response = await fetch(`${API_BASE}/translate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, target_lang: state.accent === 'us' || state.accent === 'uk' ? 'ar' : 'en' })
      });
      const data = await response.json();
      if (data.translated && data.translated !== text) {
        document.getElementById('infoText').textContent = data.translated;
        document.getElementById('infoMsg').classList.add('active');
      }
    } catch (err) {}
  }
});
</script>

</body>
</html>
