<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PronounceIt — Native Pronunciation Search</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #141417;
    --surface2: #1c1c21;
    --surface3: #232329;
    --border: #2d2d35;
    --accent: #f97316;
    --accent-hover: #ea580c;
    --accent2: #06b6d4;
    --text: #fafafa;
    --text-secondary: #a1a1aa;
    --muted: #71717a;
    --error: #ef4444;
    --success: #22c55e;
    --warning: #eab308;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    line-height: 1.5;
    background-image: 
      radial-gradient(ellipse at 20% 0%, rgba(249, 115, 22, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  .header {
    text-align: center;
    padding: 48px 0 40px;
    position: relative;
  }

  .logo {
    font-size: 52px;
    font-weight: 800;
    letter-spacing: -2px;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent) 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    color: var(--text-secondary);
    font-size: 17px;
    max-width: 520px;
    margin: 0 auto;
    font-weight: 400;
  }

  .tagline strong {
    color: var(--accent);
    font-weight: 600;
  }

  .search-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 24px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
  }

  .search-row {
    display: flex;
    gap: 14px;
    align-items: stretch;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  .search-input {
    width: 100%;
    height: 58px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 0 20px;
    color: var(--text);
    font-size: 18px;
    font-family: inherit;
    transition: all 0.2s ease;
  }

  .search-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.15);
  }

  .search-input::placeholder {
    color: var(--muted);
  }

  .search-input.error {
    border-color: var(--error);
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .accent-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .accent-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
    padding-left: 2px;
  }

  .accent-btns {
    display: flex;
    gap: 6px;
    height: 58px;
  }

  .accent-btn {
    padding: 0 20px;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .accent-btn:hover {
    border-color: var(--text-secondary);
    color: var(--text);
  }

  .accent-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .search-btn {
    height: 58px;
    padding: 0 36px;
    background: linear-gradient(135deg, var(--accent), #f97316dd);
    border: none;
    border-radius: var(--radius);
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
  }

  .search-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(249, 115, 22, 0.4);
  }

  .search-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .search-btn .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .validation-msg {
    font-size: 13px;
    color: var(--error);
    margin-top: 10px;
    padding-left: 4px;
    display: none;
  }

  .validation-msg.show {
    display: block;
  }

  .player-section {
    display: none;
    grid-template-columns: 1fr 340px;
    gap: 20px;
  }

  .player-section.active {
    display: grid;
  }

  @media (max-width: 900px) {
    .player-section { grid-template-columns: 1fr; }
    .search-row { flex-direction: column; }
    .accent-btns { height: 48px; }
    .search-btn { width: 100%; justify-content: center; }
  }

  .video-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 16px 16px 0 0;
    overflow: hidden;
  }

  #youtubePlayer {
    width: 100%;
    height: 100%;
  }

  .video-controls {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .ctrl-btn {
    width: 44px;
    height: 44px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 16px;
  }

  .ctrl-btn:hover {
    background: var(--surface3);
    border-color: var(--text-secondary);
  }

  .ctrl-btn.play-btn {
    background: var(--accent);
    border-color: var(--accent);
    width: 52px;
    height: 52px;
    font-size: 18px;
  }

  .ctrl-btn.play-btn:hover {
    background: var(--accent-hover);
    border-color: var(--accent-hover);
  }

  .ctrl-info {
    flex: 1;
    min-width: 0;
  }

  .ctrl-title {
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 14px;
  }

  .ctrl-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
  }

  .time-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    background: rgba(249, 115, 22, 0.12);
    padding: 6px 12px;
    border-radius: 6px;
  }

  .subtitle-wrap {
    padding: 24px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    min-height: 110px;
  }

  .subtitle-text {
    font-size: 21px;
    line-height: 1.7;
    text-align: center;
    color: var(--text);
    font-weight: 500;
  }

  .subtitle-text .highlight {
    color: var(--accent);
    font-weight: 700;
    border-bottom: 3px solid var(--accent);
    padding: 0 3px;
  }

  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .occurrences-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    flex: 1;
  }

  .occ-title {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 14px;
    font-weight: 600;
  }

  .occ-count {
    background: var(--accent);
    color: white;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    margin-left: 8px;
    font-weight: 700;
  }

  .occ-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 420px;
    overflow-y: auto;
  }

  .occ-item {
    padding: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
  }

  .occ-item:hover {
    border-color: var(--accent);
    background: rgba(249, 115, 22, 0.08);
  }

  .occ-item.active {
    border-color: var(--accent);
    background: rgba(249, 115, 22, 0.12);
  }

  .occ-text {
    color: var(--text);
    line-height: 1.45;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .occ-meta {
    color: var(--muted);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
  }

  .occ-text .match {
    color: var(--accent);
    font-weight: 700;
  }

  .nav-btns {
    display: flex;
    gap: 8px;
  }

  .nav-btn {
    flex: 1;
    height: 48px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .nav-btn:hover:not(:disabled) {
    background: var(--surface3);
    border-color: var(--text-secondary);
  }

  .nav-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .alert {
    display: none;
    padding: 16px 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    align-items: flex-start;
    gap: 12px;
    font-size: 14px;
    line-height: 1.5;
  }

  .alert.show { display: flex; }

  .alert.error {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.25);
    color: #fca5a5;
  }

  .alert.warning {
    background: rgba(234, 179, 8, 0.1);
    border: 1px solid rgba(234, 179, 8, 0.25);
    color: #fde047;
  }

  .alert.success {
    background: rgba(34, 197, 94, 0.1);
    border: 1px solid rgba(34, 197, 94, 0.25);
    color: #86efac;
  }

  .alert-icon {
    font-size: 18px;
    flex-shrink: 0;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }

  .empty-state svg {
    width: 48px;
    height: 48px;
    margin-bottom: 12px;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <div class="logo">PronounceIt</div>
    <p class="tagline">Hear native speakers pronounce any word in <strong>real YouTube videos</strong></p>
  </header>

  <div class="search-wrapper">
    <div class="search-row">
      <div class="input-wrap">
        <input type="text" class="search-input" id="searchInput" 
               placeholder="Type a word or phrase (e.g., entrepreneur)" 
               autocomplete="off" spellcheck="false">
        <div class="validation-msg" id="validationMsg"></div>
      </div>
      
      <div class="accent-group">
        <span class="accent-label">Accent</span>
        <div class="accent-btns">
          <button class="accent-btn active" data-accent="us" onclick="setAccent('us')">🇺🇸 US</button>
          <button class="accent-btn" data-accent="uk" onclick="setAccent('uk')">🇬🇧 UK</button>
          <button class="accent-btn" data-accent="au" onclick="setAccent('au')">🇦🇺 AU</button>
        </div>
      </div>

      <button class="search-btn" id="searchBtn" onclick="startSearch()">
        <span id="btnIcon">🔍</span>
        <span id="btnText">Search</span>
      </button>
    </div>
  </div>

  <div class="alert warning" id="connectionAlert">
    <span class="alert-icon">🔌</span>
    <div>
      <strong>Cannot connect to server</strong><br>
      Make sure the backend is running on <code>localhost:8000</code>, or the search won't work.
    </div>
  </div>

  <div class="alert error" id="errorAlert">
    <span class="alert-icon">⚠️</span>
    <span id="errorText"></span>
  </div>

  <div class="alert success" id="successAlert">
    <span class="alert-icon">✅</span>
    <span id="successText"></span>
  </div>

  <div class="player-section" id="playerSection">
    <div class="video-card">
      <div class="video-wrap">
        <div id="youtubePlayer"></div>
      </div>
      
      <div class="video-controls">
        <button class="ctrl-btn" onclick="prevOccurrence()" title="Previous">◀</button>
        <button class="ctrl-btn play-btn" id="playPauseBtn" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" onclick="nextOccurrence()" title="Next">▶</button>
        
        <div class="ctrl-info">
          <div class="ctrl-title" id="videoTitle">Loading...</div>
          <div class="ctrl-meta" id="videoMeta">Preparing video...</div>
        </div>
        
        <div class="time-badge" id="currentTime">0:00</div>
      </div>

      <div class="subtitle-wrap">
        <div class="subtitle-text" id="subtitleDisplay">
          <span style="color: var(--muted); font-style: italic;">Subtitle will appear here...</span>
        </div>
      </div>
    </div>

    <div class="sidebar">
      <div class="occurrences-card">
        <div class="occ-title">Found Matches <span class="occ-count" id="occCount">0</span></div>
        <div class="occ-list" id="occList">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <div>Searching for matches...</div>
          </div>
        </div>
      </div>

      <div class="nav-btns">
        <button class="nav-btn" onclick="prevOccurrence()" id="prevBtn">← Previous</button>
        <button class="nav-btn" onclick="nextOccurrence()" id="nextBtn">Next →</button>
      </div>
    </div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const API_BASE = 'http://localhost:8000';

let state = {
  accent: 'us',
  query: '',
  occurrences: [],
  currentIndex: 0,
  player: null,
  isPlaying: false,
  isSearching: false
};

function onYouTubeIframeAPIReady() {
  state.player = new YT.Player('youtubePlayer', {
    height: '100%',
    width: '100%',
    playerVars: {
      autoplay: 0,
      controls: 0,
      disablekb: 1,
      fs: 0,
      rel: 0,
      modestbranding: 1,
      playsinline: 1
    },
    events: {
      onReady: () => console.log('Player ready'),
      onStateChange: (e) => {
        state.isPlaying = e.data === YT.PlayerState.PLAYING;
        document.getElementById('playPauseBtn').textContent = state.isPlaying ? '⏸' : '▶';
      }
    }
  });
}

function setAccent(accent) {
  state.accent = accent;
  document.querySelectorAll('.accent-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.accent === accent);
  });
}

function showValidation(msg) {
  const input = document.getElementById('searchInput');
  const validationEl = document.getElementById('validationMsg');
  
  if (msg) {
    input.classList.add('error');
    validationEl.textContent = msg;
    validationEl.classList.add('show');
    setTimeout(() => {
      input.classList.remove('error');
    }, 400);
  } else {
    input.classList.remove('error');
    validationEl.classList.remove('show');
  }
}

function showError(msg) {
  document.getElementById('errorText').textContent = msg;
  document.getElementById('errorAlert').classList.add('show');
  document.getElementById('successAlert').classList.remove('show');
  document.getElementById('connectionAlert').classList.remove('show');
}

function showSuccess(msg) {
  document.getElementById('successText').textContent = msg;
  document.getElementById('successAlert').classList.add('show');
  document.getElementById('errorAlert').classList.remove('show');
  document.getElementById('connectionAlert').classList.remove('show');
}

function hideAlerts() {
  document.getElementById('errorAlert').classList.remove('show');
  document.getElementById('successAlert').classList.remove('show');
  document.getElementById('connectionAlert').classList.remove('show');
}

function setLoading(loading) {
  const btn = document.getElementById('searchBtn');
  const btnIcon = document.getElementById('btnIcon');
  const btnText = document.getElementById('btnText');
  
  btn.disabled = loading;
  
  if (loading) {
    btnIcon.innerHTML = '<div class="spinner"></div>';
    btnText.textContent = 'Searching...';
  } else {
    btnIcon.textContent = '🔍';
    btnText.textContent = 'Search';
  }
}

async function startSearch() {
  const query = document.getElementById('searchInput').value.trim();
  
  hideAlerts();
  
  if (!query) {
    showValidation('Please enter a word or phrase to search');
    return;
  }
  
  if (query.length < 2) {
    showValidation('Search term must be at least 2 characters');
    return;
  }
  
  if (!/^[a-zA-Z\s]+$/.test(query)) {
    showValidation('Only letters and spaces allowed');
    return;
  }
  
  showValidation('');
  
  state.query = query.toLowerCase();
  state.isSearching = true;
  state.occurrences = [];
  state.currentIndex = 0;
  
  document.getElementById('playerSection').classList.remove('active');
  document.getElementById('occList').innerHTML = '<div class="empty-state"><div>Searching...</div></div>';
  setLoading(true);
  
  try {
    const response = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}&accent=${state.accent}`);
    
    if (!response.ok) {
      throw new Error(`Server error: ${response.status}`);
    }
    
    const data = await response.json();
    
    if (data.error) {
      throw new Error(data.error);
    }
    
    state.occurrences = data.results || [];
    
    if (state.occurrences.length === 0) {
      showError(`No matches found for "${query}". Try a different word or check your spelling.`);
      setLoading(false);
      state.isSearching = false;
      return;
    }
    
    document.getElementById('playerSection').classList.add('active');
    setLoading(false);
    state.isSearching = false;
    
    showSuccess(`Found ${state.occurrences.length} match${state.occurrences.length > 1 ? 'es' : ''}!`);
    
    renderOccurrenceList();
    loadOccurrence(0);
    
  } catch (error) {
    setLoading(false);
    state.isSearching = false;
    
    if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
      document.getElementById('connectionAlert').classList.add('show');
    } else {
      showError(error.message || 'An unexpected error occurred. Please try again.');
    }
  }
}

function loadOccurrence(index) {
  if (index < 0 || index >= state.occurrences.length) return;
  
  state.currentIndex = index;
  const occ = state.occurrences[index];
  
  if (state.player && state.player.loadVideoById) {
    const startTime = Math.max(0, occ.timestamp - 1);
    state.player.loadVideoById({
      videoId: occ.videoId,
      startSeconds: startTime
    });
  }
  
  document.getElementById('videoTitle').textContent = occ.video_title || 'Loading...';
  document.getElementById('videoMeta').textContent = `${occ.video_channel || 'Unknown'} • Match ${index + 1} of ${state.occurrences.length}`;
  document.getElementById('currentTime').textContent = formatTime(occ.timestamp);
  
  const regex = new RegExp(`(${escapeRegex(state.query)})`, 'gi');
  const highlighted = escapeHtml(occ.sentence).replace(regex, '<span class="highlight">$1</span>');
  document.getElementById('subtitleDisplay').innerHTML = highlighted;
  
  document.querySelectorAll('.occ-item').forEach((el, i) => {
    el.classList.toggle('active', i === index);
    if (i === index) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
  
  document.getElementById('prevBtn').disabled = index === 0;
  document.getElementById('nextBtn').disabled = index === state.occurrences.length - 1;
}

function renderOccurrenceList() {
  const container = document.getElementById('occList');
  const countEl = document.getElementById('occCount');
  
  container.innerHTML = '';
  countEl.textContent = state.occurrences.length;
  
  state.occurrences.forEach((occ, index) => {
    const item = document.createElement('div');
    item.className = 'occ-item';
    if (index === 0) item.classList.add('active');
    
    const regex = new RegExp(`(${escapeRegex(state.query)})`, 'gi');
    const highlightedText = escapeHtml(occ.sentence).replace(regex, '<span class="match">$1</span>');
    
    item.innerHTML = `
      <div class="occ-text">${highlightedText}</div>
      <div class="occ-meta">${formatTime(occ.timestamp)} • ${occ.video_channel || 'Unknown'}</div>
    `;
    
    item.onclick = () => loadOccurrence(index);
    container.appendChild(item);
  });
}

function nextOccurrence() {
  if (state.currentIndex < state.occurrences.length - 1) {
    loadOccurrence(state.currentIndex + 1);
  }
}

function prevOccurrence() {
  if (state.currentIndex > 0) {
    loadOccurrence(state.currentIndex - 1);
  }
}

function togglePlay() {
  if (!state.player) return;
  state.isPlaying ? state.player.pauseVideo() : state.player.playVideo();
}

function formatTime(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function escapeRegex(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

document.getElementById('searchInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') startSearch();
});

document.getElementById('searchInput').addEventListener('input', () => {

});
