<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouGlish Clone — Pronunciation Search</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #252525;
    --border: #333;
    --accent: #ff6b35;
    --accent2: #4ecdc4;
    --text: #ffffff;
    --muted: #888;
    --error: #ff4757;
    --success: #2ed573;
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    line-height: 1.6;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 0 30px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 30px;
  }

  .logo {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .tagline {
    color: var(--muted);
    font-size: 16px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* Search Section */
  .search-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 24px;
    display: flex;
    gap: 16px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .input-group {
    flex: 1;
    min-width: 250px;
  }

  .input-label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  .search-input {
    width: 100%;
    height: 52px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 0 16px;
    color: var(--text);
    font-size: 18px;
    font-family: inherit;
    transition: all 0.2s;
  }

  .search-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .accent-selector {
    display: flex;
    gap: 8px;
  }

  .accent-btn {
    height: 52px;
    padding: 0 28px;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .accent-btn:hover {
    border-color: var(--muted);
  }

  .accent-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .search-btn {
    height: 52px;
    padding: 0 32px;
    background: var(--success);
    border: none;
    border-radius: var(--radius);
    color: #000;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .search-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(46, 213, 115, 0.3);
  }

  .search-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Player Section */
  .player-section {
    display: none;
    grid-template-columns: 1fr 350px;
    gap: 24px;
    margin-bottom: 24px;
  }

  .player-section.active {
    display: grid;
  }

  @media (max-width: 900px) {
    .player-section {
      grid-template-columns: 1fr;
    }
  }

  .main-player {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .video-container {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
  }

  #youtubePlayer {
    width: 100%;
    height: 100%;
  }

  .player-controls {
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .control-btn {
    width: 40px;
    height: 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .control-btn:hover {
    background: var(--border);
    border-color: var(--muted);
  }

  .control-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    width: 48px;
    height: 48px;
  }

  .control-info {
    flex: 1;
    min-width: 0;
  }

  .control-title {
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 14px;
  }

  .control-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .timestamp {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--accent);
    font-weight: 600;
    background: rgba(255, 107, 53, 0.1);
    padding: 4px 12px;
    border-radius: 4px;
  }

  /* Subtitle Display */
  .subtitle-box {
    padding: 24px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    min-height: 100px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .subtitle-text {
    font-size: 22px;
    line-height: 1.6;
    text-align: center;
    color: var(--text);
    font-weight: 500;
  }

  .subtitle-text .highlight {
    color: var(--accent);
    font-weight: 700;
    border-bottom: 3px solid var(--accent);
    padding: 0 4px;
  }

  .subtitle-text .context {
    color: var(--muted);
    font-weight: 400;
  }

  /* Sidebar */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .stats-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .stats-title {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    font-weight: 600;
  }

  .occurrence-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 400px;
    overflow-y: auto;
  }

  .occurrence-item {
    padding: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
  }

  .occurrence-item:hover {
    border-color: var(--accent);
    background: rgba(255, 107, 53, 0.1);
  }

  .occurrence-item.active {
    border-color: var(--accent);
    background: rgba(255, 107, 53, 0.15);
  }

  .occurrence-text {
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .occurrence-meta {
    color: var(--muted);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
  }

  .occurrence-text .match {
    color: var(--accent);
    font-weight: 700;
  }

  /* Navigation */
  .nav-buttons {
    display: flex;
    gap: 8px;
  }

  .nav-btn {
    flex: 1;
    height: 44px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .nav-btn:hover:not(:disabled) {
    background: var(--border);
    border-color: var(--muted);
  }

  .nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* Progress */
  .progress-container {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }

  .progress-container.active {
    display: block;
  }

  .progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 12px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.3s;
  }

  .progress-text {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }

  /* Status Messages */
  .message {
    display: none;
    padding: 16px 20px;
    border-radius: var(--radius);
    margin-bottom: 24px;
    align-items: center;
    gap: 12px;
  }

  .message.active {
    display: flex;
  }

  .message.error {
    background: rgba(255, 71, 87, 0.1);
    border: 1px solid rgba(255, 71, 87, 0.3);
    color: var(--error);
  }

  .message.info {
    background: rgba(78, 205, 196, 0.1);
    border: 1px solid rgba(78, 205, 196, 0.3);
    color: var(--accent2);
  }

  /* Loading Spinner */
  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Responsive */
  @media (max-width: 640px) {
    .search-container {
      flex-direction: column;
    }
    .input-group {
      width: 100%;
    }
    .accent-selector {
      width: 100%;
    }
    .accent-btn {
      flex: 1;
      justify-content: center;
    }
    .search-btn {
      width: 100%;
      justify-content: center;
    }
    .subtitle-text {
      font-size: 18px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <div class="logo">YouGlish Clone</div>
    <p class="tagline">Search YouTube videos to hear native speakers pronounce any word or phrase in real context.</p>
  </header>

  <div class="search-container">
    <div class="input-group">
      <label class="input-label">Word or Phrase</label>
      <input type="text" class="search-input" id="searchInput" placeholder="e.g., 'entrepreneur', 'schedule', 'pronunciation'" autocomplete="off">
    </div>
    
    <div class="input-group" style="flex: 0;">
      <label class="input-label">Accent</label>
      <div class="accent-selector">
        <button class="accent-btn active" data-accent="us" onclick="setAccent('us')">🇺🇸 US</button>
        <button class="accent-btn" data-accent="uk" onclick="setAccent('uk')">🇬🇧 UK</button>
        <button class="accent-btn" data-accent="au" onclick="setAccent('au')">🇦🇺 AU</button>
      </div>
    </div>

    <button class="search-btn" id="searchBtn" onclick="startSearch()">
      <span>🔍</span>
      Search
    </button>
  </div>

  <div class="progress-container" id="progressContainer">
    <div class="progress-text">
      <span id="progressStatus">Initializing search...</span>
      <span id="progressCount">0/0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="message error" id="errorMsg">
    <span>⚠️</span>
    <span id="errorText"></span>
  </div>

  <div class="message info" id="infoMsg">
    <span>ℹ️</span>
    <span id="infoText"></span>
  </div>

  <div class="player-section" id="playerSection">
    <div class="main-player">
      <div class="video-container">
        <div id="youtubePlayer"></div>
      </div>
      
      <div class="player-controls">
        <button class="control-btn" onclick="prevOccurrence()" title="Previous">◀</button>
        <button class="control-btn primary" id="playPauseBtn" onclick="togglePlay()">▶</button>
        <button class="control-btn" onclick="nextOccurrence()" title="Next">▶</button>
        
        <div class="control-info">
          <div class="control-title" id="videoTitle">Loading...</div>
          <div class="control-meta" id="videoMeta">Searching transcripts...</div>
        </div>
        
        <div class="timestamp" id="currentTime">0:00</div>
      </div>

      <div class="subtitle-box">
        <div class="subtitle-text" id="subtitleDisplay">
          <span style="color: var(--muted); font-style: italic;">Subtitles will appear here...</span>
        </div>
      </div>
    </div>

    <div class="sidebar">
      <div class="stats-card">
        <div class="stats-title">Found Occurrences</div>
        <div class="occurrence-list" id="occurrenceList">
          <!-- Populated dynamically -->
        </div>
      </div>

      <div class="nav-buttons">
        <button class="nav-btn" onclick="prevOccurrence()" id="prevBtn">← Previous</button>
        <button class="nav-btn" onclick="nextOccurrence()" id="nextBtn">Next →</button>
      </div>
    </div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// Configuration
const CONFIG = {
  API_KEY: 'AIzaSyDGM1AMLvdPGn3fRw79pGMSRVuHfaHjEWc', // Will fallback to invidious if quota hit
  MAX_RESULTS: 20,
  PRELOAD_COUNT: 5, // How many videos to check transcripts for
  INVIDIOUS_INSTANCES: [
    'https://iv.datura.network',
    'https://iv.nboeck.de',
    'https://iv.melmac.space'
  ]
};

// State
let state = {
  accent: 'us',
  query: '',
  videos: [],
  occurrences: [], // All found instances of the word
  currentIndex: 0,
  player: null,
  isPlaying: false,
  isSearching: false
};

// Initialize YouTube Player
function onYouTubeIframeAPIReady() {
  state.player = new YT.Player('youtubePlayer', {
    height: '100%',
    width: '100%',
    playerVars: {
      autoplay: 0,
      controls: 0,
      disablekb: 1,
      fs: 0,
      rel: 0,
      modestbranding: 1
    },
    events: {
      onReady: () => {
        console.log('Player ready');
      },
      onStateChange: (e) => {
        state.isPlaying = e.data === YT.PlayerState.PLAYING;
        document.getElementById('playPauseBtn').textContent = state.isPlaying ? '⏸' : '▶';
      }
    }
  });
}

function setAccent(accent) {
  state.accent = accent;
  document.querySelectorAll('.accent-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.accent === accent);
  });
}

async function startSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query || state.isSearching) return;
  
  state.query = query.toLowerCase();
  state.isSearching = true;
  state.occurrences = [];
  state.currentIndex = 0;
  
  // UI Reset
  document.getElementById('playerSection').classList.remove('active');
  document.getElementById('errorMsg').classList.remove('active');
  document.getElementById('infoMsg').classList.remove('active');
  document.getElementById('progressContainer').classList.add('active');
  document.getElementById('searchBtn').disabled = true;
  document.getElementById('occurrenceList').innerHTML = '';
  
  updateProgress(0, CONFIG.PRELOAD_COUNT, 'Searching for videos...');
  
  try {
    // 1. Get video list from YouTube or Invidious
    let videos = await fetchVideos(query, state.accent);
    
    if (!videos.length) {
      throw new Error('No videos found. Try a different search term.');
    }
    
    // Limit to first few videos for speed
    videos = videos.slice(0, CONFIG.PRELOAD_COUNT);
    state.videos = videos;
    
    // 2. Scan transcripts
    updateProgress(0, videos.length, 'Scanning video transcripts...');
    
    for (let i = 0; i < videos.length; i++) {
      const video = videos[i];
      updateProgress(i, videos.length, `Checking: ${video.title.substring(0, 40)}...`);
      
      try {
        const transcript = await fetchTranscript(video.id);
        if (transcript && transcript.length) {
          // Search for word in transcript
          const matches = findInTranscript(transcript, state.query);
          
          matches.forEach(match => {
            state.occurrences.push({
              video: video,
              ...match
            });
          });
        }
      } catch (e) {
        console.error(`Failed to get transcript for ${video.id}:`, e);
      }
      
      updateProgress(i + 1, videos.length, `Scanned ${i + 1} of ${videos.length} videos...`);
    }
    
    if (state.occurrences.length === 0) {
      throw new Error(`Found ${videos.length} videos, but none contain "${query}" in their transcripts. The word might not be captioned, or try a longer phrase.`);
    }
    
    // Sort by relevance (exact matches first)
    state.occurrences.sort((a, b) => {
      const aExact = a.text.toLowerCase().includes(` ${state.query} `) ? 1 : 0;
      const bExact = b.text.toLowerCase().includes(` ${state.query} `) ? 1 : 0;
      return bExact - aExact;
    });
    
    // Show player
    document.getElementById('progressContainer').classList.remove('active');
    document.getElementById('playerSection').classList.add('active');
    document.getElementById('searchBtn').disabled = false;
    state.isSearching = false;
    
    renderOccurrenceList();
    loadOccurrence(0);
    
  } catch (error) {
    showError(error.message);
    document.getElementById('progressContainer').classList.remove('active');
    document.getElementById('searchBtn').disabled = false;
    state.isSearching = false;
  }
}

async function fetchVideos(query, accent) {
  const accentQuery = accent === 'us' ? 'american pronunciation' : 
                      accent === 'uk' ? 'british pronunciation bbc' : 
                      'australian pronunciation';
  
  const fullQuery = `${query} ${accentQuery} interview podcast`;
  
  try {
    // Try YouTube API first
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=${CONFIG.MAX_RESULTS}&q=${encodeURIComponent(fullQuery)}&relevanceLanguage=en&key=${CONFIG.API_KEY}`;
    
    const res = await fetch(url);
    const data = await res.json();
    
    if (data.error) {
      if (data.error.code === 403 || data.error.message.includes('quota')) {
        console.log('Quota exceeded, trying Invidious...');
        return fetchInvidiousVideos(fullQuery);
      }
      throw new Error(data.error.message);
    }
    
    return data.items.map(item => ({
      id: item.id.videoId,
      title: item.snippet.title,
      channel: item.snippet.channelTitle
    }));
    
  } catch (e) {
    console.log('YouTube API failed, trying Invidious...');
    return fetchInvidiousVideos(fullQuery);
  }
}

async function fetchInvidiousVideos(query) {
  for (const instance of CONFIG.INVIDIOUS_INSTANCES) {
    try {
      const url = `${instance}/api/v1/search?q=${encodeURIComponent(query)}&type=video`;
      const res = await fetch(url, { timeout: 5000 });
      if (!res.ok) continue;
      
      const data = await res.json();
      return data.slice(0, CONFIG.MAX_RESULTS).map(item => ({
        id: item.videoId,
        title: item.title,
        channel: item.author
      }));
    } catch (e) {
      continue;
    }
  }
  throw new Error('All video sources failed');
}

async function fetchTranscript(videoId) {
  // Try multiple caption sources
  const sources = [
    // Auto-generated English
    `https://www.youtube.com/api/timedtext?lang=en&v=${videoId}&fmt=json3&kind=asr`,
    // Manual English captions
    `https://www.youtube.com/api/timedtext?lang=en&v=${videoId}&fmt=json3`,
    `https://www.youtube.com/api/timedtext?lang=en-US&v=${videoId}&fmt=json3`,
    `https://www.youtube.com/api/timedtext?lang=en-GB&v=${videoId}&fmt=json3`
  ];
  
  for (const url of sources) {
    try {
      const res = await fetch(url);
      if (!res.ok) continue;
      
      const text = await res.text();
      if (!text || text === '{}') continue;
      
      const data = JSON.parse(text);
      if (data.events && data.events.length > 0) {
        return parseTranscript(data.events);
      }
    } catch (e) {
      continue;
    }
  }
  
  // Fallback to XML format (srv3)
  try {
    const res = await fetch(`https://www.youtube.com/api/timedtext?lang=en&v=${videoId}&fmt=srv3`);
    if (res.ok) {
      const xml = await res.text();
      return parseSrv3(xml);
    }
  } catch (e) {}
  
  return null;
}

function parseTranscript(events) {
  const captions = [];
  
  events.forEach(event => {
    if (!event.segs) return;
    
    const text = event.segs.map(seg => seg.utf8 || '').join('');
    if (!text.trim()) return;
    
    captions.push({
      start: (event.tStartMs || 0) / 1000,
      duration: (event.dDurationMs || 3000) / 1000,
      text: text.replace(/\n/g, ' ').trim()
    });
  });
  
  return captions;
}

function parseSrv3(xml) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const paragraphs = doc.querySelectorAll('p');
  
  return Array.from(paragraphs).map(p => ({
    start: parseInt(p.getAttribute('t') || 0) / 1000,
    duration: parseInt(p.getAttribute('d') || 3000) / 1000,
    text: p.textContent.replace(/\n/g, ' ').trim()
  })).filter(c => c.text);
}

function findInTranscript(transcript, query) {
  const matches = [];
  const queryLower = query.toLowerCase();
  
  transcript.forEach((cap, index) => {
    const textLower = cap.text.toLowerCase();
    
    // Check for exact match or word boundary match
    if (textLower.includes(queryLower)) {
      // Get context (previous and next captions)
      const prev = index > 0 ? transcript[index - 1].text : '';
      const next = index < transcript.length - 1 ? transcript[index + 1].text : '';
      
      matches.push({
        start: cap.start,
        text: cap.text,
        contextBefore: prev,
        contextAfter: next,
        index: index
      });
    }
  });
  
  return matches;
}

function loadOccurrence(index) {
  if (index < 0 || index >= state.occurrences.length) return;
  
  state.currentIndex = index;
  const occ = state.occurrences[index];
  
  // Update player
  if (state.player && state.player.loadVideoById) {
    // Start 1 second before the word
    const startTime = Math.max(0, occ.start - 1);
    state.player.loadVideoById({
      videoId: occ.video.id,
      startSeconds: startTime
    });
  }
  
  // Update UI
  document.getElementById('videoTitle').textContent = occ.video.title;
  document.getElementById('videoMeta').textContent = `${occ.video.channel} • Match ${index + 1} of ${state.occurrences.length}`;
  document.getElementById('currentTime').textContent = formatTime(occ.start);
  
  // Update subtitle display with context
  const before = occ.contextBefore ? `<span class="context">${escapeHtml(occ.contextBefore)} </span>` : '';
  const current = `<span class="highlight">${escapeHtml(occ.text)}</span>`;
  const after = occ.contextAfter ? ` <span class="context">${escapeHtml(occ.contextAfter)}</span>` : '';
  
  document.getElementById('subtitleDisplay').innerHTML = before + current + after;
  
  // Update occurrence list active state
  document.querySelectorAll('.occurrence-item').forEach((el, i) => {
    el.classList.toggle('active', i === index);
    if (i === index) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
  
  // Update nav buttons
  document.getElementById('prevBtn').disabled = index === 0;
  document.getElementById('nextBtn').disabled = index === state.occurrences.length - 1;
}

function renderOccurrenceList() {
  const container = document.getElementById('occurrenceList');
  container.innerHTML = '';
  
  state.occurrences.forEach((occ, index) => {
    const item = document.createElement('div');
    item.className = 'occurrence-item';
    if (index === 0) item.classList.add('active');
    
    // Highlight the matched word in the text snippet
    const regex = new RegExp(`(${escapeRegex(state.query)})`, 'gi');
    const highlightedText = escapeHtml(occ.text).replace(regex, '<span class="match">$1</span>');
    
    item.innerHTML = `
      <div class="occurrence-text">${highlightedText}</div>
      <div class="occurrence-meta">${formatTime(occ.start)} • ${occ.video.channel}</div>
    `;
    
    item.onclick = () => loadOccurrence(index);
    container.appendChild(item);
  });
}

function nextOccurrence() {
  if (state.currentIndex < state.occurrences.length - 1) {
    loadOccurrence(state.currentIndex + 1);
  }
}

function prevOccurrence() {
  if (state.currentIndex > 0) {
    loadOccurrence(state.currentIndex - 1);
  }
}

function togglePlay() {
  if (!state.player) return;
  
  if (state.isPlaying) {
    state.player.pauseVideo();
  } else {
    state.player.playVideo();
  }
}

function updateProgress(current, total, text) {
  document.getElementById('progressStatus').textContent = text;
  document.getElementById('progressCount').textContent = `${current}/${total}`;
  document.getElementById('progressFill').style.width = `${(current / total) * 100}%`;
}

function showError(text) {
  document.getElementById('errorText').textContent = text;
  document.getElementById('errorMsg').classList.add('active');
}

function formatTime(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function escapeRegex(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// Enter key to search
document.getElementById('searchInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') startSearch();
});
</script>
