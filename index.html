<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PronounceIt — Hear It Right</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0c10; --surface: #13151c; --surface2: #1c1f2b; --border: #252836;
    --accent: #e8ff47; --accent2: #47c8ff; --text: #eef0f6; --muted: #6b7090;
    --us-color: #e8ff47; --uk-color: #47c8ff; --danger: #ff6b6b; --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
  body::before, body::after { content: ''; position: fixed; pointer-events: none; z-index: 0; }
  body::before { top: -40%; left: -20%; width: 80vw; height: 80vh; background: radial-gradient(ellipse, rgba(232,255,71,0.04) 0%, transparent 70%); }
  body::after  { bottom: -30%; right: -20%; width: 70vw; height: 70vh; background: radial-gradient(ellipse, rgba(71,200,255,0.05) 0%, transparent 70%); }

  .page-wrapper { flex: 1 0 auto; }
  .wrapper { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 48px 24px 80px; }
  header { margin-bottom: 48px; animation: fadeDown 0.6s ease both; }
  header .eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
  header h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 800; line-height: 1.05; letter-spacing: -0.02em; }
  header h1 span { color: var(--accent); }
  header p { margin-top: 12px; color: var(--muted); font-size: 15px; font-weight: 400; max-width: 460px; }

  .search-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 24px; animation: fadeDown 0.6s 0.1s ease both; }
  .search-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }
  .search-row { display: flex; gap: 12px; align-items: stretch; }
  .search-input-wrap { flex: 1; position: relative; }
  .search-input-wrap svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); opacity: 0.35; }
  #searchInput { width: 100%; height: 56px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 0 16px 0 48px; color: var(--text); font-size: 16px; font-weight: 600; outline: none; transition: border-color 0.25s, box-shadow 0.25s; }
  #searchInput::placeholder { color: var(--muted); font-weight: 400; }
  #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,255,71,0.1); }
  .search-btn { height: 56px; padding: 0 28px; background: var(--accent); color: #0b0c10; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: transform 0.15s, opacity 0.2s; }
  .search-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .accent-row { display: flex; gap: 12px; margin-top: 16px; }
  .accent-btn { flex: 1; height: 48px; background: transparent; border: 1.5px solid var(--border); border-radius: 10px; color: var(--muted); font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; position: relative; }
  .accent-btn.active[data-accent="US"] { border-color: var(--us-color); color: var(--us-color); background: rgba(232,255,71,0.06); }
  .accent-btn.active[data-accent="UK"] { border-color: var(--uk-color); color: var(--uk-color); background: rgba(71,200,255,0.06); }

  .status-bar, .error-bar { display: none; align-items: center; gap: 10px; padding: 14px 18px; border-radius: var(--radius); margin-bottom: 16px; font-size: 13px; font-family: 'DM Mono', monospace; }
  .status-bar { background: var(--surface); border: 1px solid var(--border); }
  .error-bar { background: rgba(255,107,107,0.06); border: 1px solid rgba(255,107,107,0.25); color: var(--danger); }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }

  .results-section, .player-section, .subtitle-section { display: none; animation: fadeDown 0.5s ease both; }
  .results-section.visible, .player-section.visible, .subtitle-section.visible { display: block; }
  .video-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; max-height: 320px; overflow-y: auto; padding-right: 4px; margin-bottom: 28px; }
  .video-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; cursor: pointer; display: flex; flex-direction: column; gap: 8px; transition: all 0.2s; }
  .video-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .video-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 6px; background: var(--surface2); }
  .video-card .vid-title { font-size: 12px; font-weight: 600; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
  .video-card .vid-channel { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer { flex-shrink: 0; padding: 24px 16px; text-align: center; border-top: 1px solid var(--border); background: var(--surface); }
  .footer-content p { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 6px; }
  .footer-content a { font-size: 13px; color: var(--accent); text-decoration: none; font-family: 'DM Mono', monospace; transition: opacity 0.2s; }
  .footer-content a:hover { opacity: 0.7; }
</style>
</head>
<body>
<div class="page-wrapper">
  <div class="wrapper">
    <header>
      <div class="eyebrow">Pronunciation Tool</div>
      <h1>Hear It <span>Right.</span></h1>
      <p>Search any word or phrase, choose your accent, and hear real native speakers pronounce it.</p>
    </header>

    <div class="search-section">
      <div class="search-label">Search Word or Phrase</div>
      <div class="search-row">
        <div class="search-input-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="searchInput" placeholder="e.g. entrepreneur, schedule, aluminum…" />
        </div>
        <button class="search-btn" id="searchBtn">Search</button>
      </div>
      <div class="accent-row">
        <button class="accent-btn active" data-accent="US">🇺🇸 American English</button>
        <button class="accent-btn" data-accent="UK">🇬🇧 British English</button>
      </div>
    </div>

    <div class="status-bar" id="statusBar"><div class="spinner"></div><span id="statusText">Searching YouTube…</span></div>
    <div class="error-bar" id="errorBar"><span>⚠</span> <span id="errorText">Something went wrong.</span></div>

    <div class="results-section" id="resultsSection">
      <div class="results-header">
        <h2>Results</h2><span class="count" id="resultsCount"></span>
      </div>
      <div class="video-list" id="videoList"></div>
    </div>

    <div class="player-section" id="playerSection">
      <div class="player-wrap">
        <div class="player-now-playing">
          <span class="now-badge">Now Playing</span>
          <span class="now-title" id="nowTitle">—</span>
          <span class="now-accent-badge US" id="accentBadge">US</span>
        </div>
        <div id="playerContainer"></div>
      </div>
    </div>

  </div>
</div>

<footer class="footer">
  <div class="footer-content">
    <p>&copy; 2026 PronounceIt. Made with ❤️</p>
  </div>
</footer>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const API_KEY = 'AIzaSyDGM1AMLvdPGn3fRw79pGMSRVuHfaHjEWc';

let currentAccent = 'US', videos=[], currentIndex=0, player=null;

// Accent buttons
document.querySelectorAll('.accent-btn').forEach(btn=>{
  btn.addEventListener('click',()=> {
    document.querySelectorAll('.accent-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentAccent = btn.dataset.accent;
    document.getElementById('accentBadge').textContent = currentAccent;
  });
});

// Search button
document.getElementById('searchBtn').addEventListener('click',doSearch);

function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if(!query) return;
  showStatus(true,'Searching YouTube…');
  fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=12&q=${encodeURIComponent(query+' '+currentAccent)}&type=video&key=${API_KEY}`)
    .then(r=>r.json())
    .then(data=>{
      showStatus(false);
      if(data.items?.length) {
        videos = data.items;
        currentIndex = 0;
        renderVideoList();
        playVideo(0);
      } else showError('No results found.');
    })
    .catch(err=>{ console.error(err); showStatus(false); showError('Failed to fetch results.'); });
}

function renderVideoList() {
  const list = document.getElementById('videoList');
  list.innerHTML = '';
  videos.forEach((v,i)=>{
    const card = document.createElement('div');
    card.className = 'video-card';
    card.innerHTML = `
      <img src="${v.snippet.thumbnails.medium.url}" />
      <div class="vid-title">${v.snippet.title}</div>
      <div class="vid-channel">${v.snippet.channelTitle}</div>
    `;
    card.addEventListener('click',()=>playVideo(i));
    list.appendChild(card);
  });
  document.getElementById('resultsSection').classList.add('visible');
}

function showStatus(show,msg='') {
  const bar = document.getElementById('statusBar');
  bar.style.display = show?'flex':'none';
  document.getElementById('statusText').textContent = msg;
}
function showError(msg) {
  const bar = document.getElementById('errorBar');
  bar.style.display = 'flex';
  document.getElementById('errorText').textContent = msg;
  setTimeout(()=>bar.style.display='none',4000);
}

// ── YouTube Player ──
function onYouTubeIframeAPIReady() {
  player = new YT.Player('playerContainer', {
    width:'100%', height:'100%',
    videoId:'',
    playerVars:{ autoplay:1, rel:0 },
    events: { onReady:()=>{}, onStateChange:onPlayerStateChange, onError:()=>{} }
  });
}

function playVideo(index) {
  if(!videos[index] || !player) return;
  currentIndex=index;
  const vidId = videos[index].id.videoId;
  document.getElementById('nowTitle').textContent = videos[index].snippet.title;
  document.querySelectorAll('.video-card').forEach((c,i)=>c.classList.toggle('active',i===index));
  document.getElementById('playerSection').classList.add('visible');
  player.loadVideoById(vidId);
}

function onPlayerStateChange(e){
  // optional: handle state changes if needed
}
</script>
</body>
</html>
